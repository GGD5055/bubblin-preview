  .thanks-desc { color: #47607a; line-height: 1.8; margin: 0 0 28px; }
  .thanks-btn { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg,#3bc1e3,#3b8fe3); color: #fff; border-radius: 999px; text-decoration: none; font-weight: 800; letter-spacing: 0.05em; box-shadow: 0 8px 24px rgba(59,143,227,0.28); }
</style>

<body>

      お問い合わせを受付いたしました。<br>
      通常1営業日以内にご返信いたします。<br>
      お急ぎの場合は <a href="tel:0523864119">052-386-4119</a> までお電話ください。
    </p>
